name: Tests

on:
  pull_request:
    branches: [main, development]
    types: [opened, synchronize, reopened]
  push:
    branches: [main, development]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Step 1: Code Quality
  code-quality:
    name: Code Quality
    runs-on: macos-26

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for TODOs in committed code
        run: |
          if git diff origin/main...HEAD -- '*.swift' 2>/dev/null | grep -E "^\+.*TODO|^\+.*FIXME"; then
            echo "Warning: New TODOs or FIXMEs detected"
          fi

      - name: Check file sizes
        run: |
          find Sources -type f -name "*.swift" -size +100k -exec echo "Warning: Large file: {}" \;

      - name: Check for print statements
        run: |
          if grep -r "print(" Sources/ --include="*.swift" | grep -v "// print"; then
            echo "Warning: print() statements found in source code"
          fi

  # Step 2: Unit Tests
  unit-tests:
    name: Unit Tests
    runs-on: macos-26
    needs: [code-quality]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Show Swift version
        run: swift --version

      - name: Resolve dependencies
        run: xcodebuild -resolvePackageDependencies -scheme glosa-av-Package -destination 'platform=macOS'

      - name: Run unit tests
        run: |
          set +e
          xcodebuild test \
            -scheme glosa-av-Package \
            -destination 'platform=macOS' \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee test_output.txt
          TEST_EXIT_CODE=$?

          if grep -q "Test Suite.*passed\|TEST SUCCEEDED" test_output.txt; then
            echo "All unit tests passed"
            exit 0
          else
            echo ""
            echo "============================================"
            echo "UNIT TESTS FAILED"
            echo "============================================"
            echo ""
            echo "Failed Tests:"
            grep "Test Case.*failed" test_output.txt || echo "  No specific test failures found"
            echo ""
            echo "Error Messages:"
            grep -E "error:|failed with|Assertion failed|Expected|Fatal error" test_output.txt | head -20 || echo "  No error messages found"
            echo ""
            exit $TEST_EXIT_CODE
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test_output.txt
          retention-days: 7

  # Step 3: Integration Tests (CLI smoke test)
  integration-tests:
    name: Integration Tests
    runs-on: macos-26
    needs: [code-quality]
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build glosa CLI (Release)
        run: |
          make release
          ls -la ./bin/

      - name: Verify CLI binary
        run: |
          file ./bin/glosa
          echo "Checking glosa --help"
          ./bin/glosa --help
