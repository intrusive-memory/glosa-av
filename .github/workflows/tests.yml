name: Tests

on:
  pull_request:
    branches: [main, development]
    types: [opened, synchronize, reopened]
  push:
    branches: [main, development]

env:
  ACERVO_APP_GROUP_ID: group.intrusive-memory.models

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Step 1: Code Quality (formatting + library hygiene checks). Hard fails only —
  # silent "Warning:" lines previously emitted by this job were ignored by
  # reviewers and provided false reassurance.
  code-quality:
    name: Code Quality
    runs-on: macos-26

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Swift format lint
        # `swift format lint --strict` does not change the exit code on every
        # toolchain version we care about, so we drive the failure from the
        # presence of diagnostic output instead.
        run: |
          OUTPUT=$(swift format lint --recursive Sources Tests 2>&1) || true
          if [ -n "$OUTPUT" ]; then
            echo "$OUTPUT"
            echo
            echo "============================================"
            echo "Formatting issues detected. Run 'make format' locally."
            echo "============================================"
            exit 1
          fi

      - name: Forbid print() in library targets
        # glosa-av is now a Foundation-only leaf vending GlosaCore only.
        # GlosaAnnotation, GlosaDirector, and the glosa CLI live in ../glosa-tools.
        # Library targets must route output through callers.
        run: |
          HITS=$(grep -rn '\bprint(' \
            Sources/GlosaCore \
            --include='*.swift' || true)
          if [ -n "$HITS" ]; then
            echo "Library code must not call print(). Found:"
            echo "$HITS"
            exit 1
          fi

      - name: Forbid non-Foundation dependencies (leaf guard)
        # ============================================================
        # AC0 LEAF-INVARIANT GUARD — locks in FR0 (RISK-5)
        #
        # glosa-av must remain a Foundation-only leaf with zero non-Apple
        # package dependencies. This step enforces the invariant established
        # by Sortie 4 so it cannot silently regress.
        #
        # Assertion logic:
        #   1. Parse Package.swift text directly via grep.
        #   2. Parse the resolved dependency graph via `swift package show-dependencies`.
        #      (This is a read-only inspection command — NOT swift build/swift test.)
        #   Both sources are checked; a match in EITHER source triggers exit 1.
        #
        # Forbidden set (any of these appearing in either source = FAIL):
        #   SwiftCompartido, SwiftBruja, SwiftAcervo, swift-argument-parser,
        #   Progress, swift-tokenizers, mlx (matches mlx*), SwiftData
        #
        # How it fails on reintroduction:
        #   If any forbidden dependency is added back to Package.swift, the grep
        #   on the manifest text will match and print the offending lines before
        #   exiting 1. Even if the Package.swift text were somehow laundered (e.g.
        #   via an indirect transitive dep not listed in the manifest), the
        #   `swift package show-dependencies` output will surface it from the
        #   resolved graph, triggering exit 1 on the second check.
        # ============================================================
        run: |
          FORBIDDEN_PATTERN='SwiftCompartido|SwiftBruja|SwiftAcervo|swift-argument-parser|Progress|swift-tokenizers|mlx|SwiftData'

          echo "--- Checking Package.swift text ---"
          MANIFEST_HITS=$(grep -E "$FORBIDDEN_PATTERN" Package.swift || true)
          if [ -n "$MANIFEST_HITS" ]; then
            echo "FAIL: Forbidden dependency found in Package.swift:"
            echo "$MANIFEST_HITS"
            MANIFEST_FAILED=1
          else
            echo "Package.swift: clean (no forbidden dependencies)"
            MANIFEST_FAILED=0
          fi

          echo ""
          echo "--- Checking resolved dependency graph (swift package show-dependencies) ---"
          DEP_OUTPUT=$(swift package show-dependencies 2>&1 || true)
          DEP_HITS=$(echo "$DEP_OUTPUT" | grep -E "$FORBIDDEN_PATTERN" || true)
          if [ -n "$DEP_HITS" ]; then
            echo "FAIL: Forbidden dependency found in resolved graph:"
            echo "$DEP_HITS"
            DEP_FAILED=1
          else
            echo "Resolved graph: clean (no forbidden dependencies)"
            DEP_FAILED=0
          fi

          echo ""
          if [ "$MANIFEST_FAILED" -eq 1 ] || [ "$DEP_FAILED" -eq 1 ]; then
            echo "============================================"
            echo "LEAF GUARD FAILED: glosa-av must remain a Foundation-only"
            echo "leaf with zero non-Apple package dependencies (AC0 / RISK-5)."
            echo "Remove the forbidden dependency from Package.swift."
            echo "============================================"
            exit 1
          fi

          echo "Leaf guard passed: glosa-av has no non-Foundation dependencies."

      - name: Forbid oversized Swift files (>100KB)
        run: |
          OVERSIZED=$(find Sources -type f -name '*.swift' -size +100k)
          if [ -n "$OVERSIZED" ]; then
            echo "Swift files over 100KB found (split them):"
            echo "$OVERSIZED" | xargs ls -lh
            exit 1
          fi

  # Step 2: Unit Tests. xcodebuild's exit code (via PIPESTATUS[0]) is the sole
  # signal of test success; the previous "grep for 'Test Suite passed'"
  # heuristic produced false greens whenever any sub-suite passed alongside a
  # failure.
  unit-tests:
    name: Unit Tests
    runs-on: macos-26
    needs: [code-quality]
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Show Swift version
        run: swift --version

      - name: Resolve dependencies
        run: xcodebuild -resolvePackageDependencies -scheme glosa-av -destination 'platform=macOS'

      - name: Run unit tests
        run: |
          set +e
          xcodebuild test \
            -scheme glosa-av \
            -destination 'platform=macOS' \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee test_output.txt
          TEST_EXIT_CODE=${PIPESTATUS[0]}

          if [ "$TEST_EXIT_CODE" -ne 0 ]; then
            echo ""
            echo "============================================"
            echo "UNIT TESTS FAILED (xcodebuild exit $TEST_EXIT_CODE)"
            echo "============================================"
            echo ""
            echo "Failed Tests:"
            grep "Test Case.*failed" test_output.txt || echo "  No specific test failures found"
            echo ""
            echo "Error Messages:"
            grep -E "error:|failed with|Assertion failed|Expected|Fatal error" test_output.txt | head -20 || echo "  No error messages found"
            echo ""
          fi
          exit "$TEST_EXIT_CODE"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: test_output.txt
          retention-days: 7
